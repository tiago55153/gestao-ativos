</script>
<script>

// ─── CONFIG ───────────────────────────────────────────────────
const CLIENT_ID = '494d8c3d-4657-4354-b705-c8e712f25079';
const TENANT_ID = '1f484560-6e6d-4f48-8597-0c51c716aeb9';
const LIST_NAME = 'tbl_ativos';
const SITE_HOST = 'plangeconcombr.sharepoint.com';
const SITE_PATH = '/sites/AplicativoGestaodeAtivos';

let app = null;           // instância MSAL
let accessToken = null;
let currentUser = null;
let allAtivos = [];
let filtered = [];
let currentPage = 1;
const pageSize = 25;
let sortField = null;
let sortAsc = true;
let editingId = null;
let detailItem = null;
let chartCat = null;
let chartSt = null;
let siteId = null;
let listId = null;
const scopes = ['https://graph.microsoft.com/Sites.ReadWrite.All', 'https://graph.microsoft.com/Files.ReadWrite.All'];

// ─── CARREGAR MSAL DINAMICAMENTE ────────────────────────────
function setLoginStatus(msg) {
  document.getElementById('login-status').textContent = msg;
}

function loadMSAL() {
  return Promise.resolve(); // biblioteca já embutida no HTML
}

async function initMSAL() {
  await loadMSAL();
  const config = {
    auth: {
      clientId: CLIENT_ID,
      authority: 'https://login.microsoftonline.com/' + TENANT_ID,
      redirectUri: 'http://localhost'
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  };
  app = new msal.PublicClientApplication(config);
  await app.initialize();
  return app;
}

// ─── LOGIN ───────────────────────────────────────────────────
document.getElementById('btn-login-ms').addEventListener('click', async function() {
  this.disabled = true;
  setLoginStatus('Inicializando...');
  try {
    await initMSAL();
    setLoginStatus('Abrindo janela de login...');
    const res = await app.loginPopup({ scopes, prompt: 'select_account' });
    app.setActiveAccount(res.account);
    currentUser = res.account;
    accessToken = res.accessToken;
    startApp();
  } catch(e) {
    setLoginStatus('Falha: ' + e.message);
    showToast('Erro: ' + e.message, 'error');
    console.error('Login error full:', e);
    this.disabled = false;
  }
});

async function getToken() {
  const account = app.getActiveAccount();
  try {
    const res = await app.acquireTokenSilent({ scopes, account });
    return res.accessToken;
  } catch {
    const res = await app.acquireTokenPopup({ scopes, account });
    return res.accessToken;
  }
}

function signOut() {
  if (app) app.logoutPopup();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ─── INICIAR APP ─────────────────────────────────────────────
async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const name = currentUser.name || currentUser.username;
  document.getElementById('user-name-header').textContent = name;
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  setTableLoading('Conectando ao SharePoint...');
  await resolveSiteAndList();
  loadAtivos();
}

// ─── GRAPH API ────────────────────────────────────────────────
async function graphGet(url) {
  const token = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

async function graphPost(url, body) {
  const token = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function graphPatch(url, body) {
  const token = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function graphDelete(url) {
  const token = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!res.ok) throw new Error(await res.text());
}

// ─── SITE + LIST ──────────────────────────────────────────────
async function resolveSiteAndList() {
  const site = await graphGet('/sites/' + SITE_HOST + ':' + SITE_PATH);
  siteId = site.id;
  const lists = await graphGet('/sites/' + siteId + '/lists?$filter=displayName eq \'' + LIST_NAME + '\'');
  if (!lists.value.length) throw new Error('Lista não encontrada: ' + LIST_NAME);
  listId = lists.value[0].id;
}

// ─── LOAD ─────────────────────────────────────────────────────
async function loadAtivos() {
  setTableLoading('Carregando dados...');
  try {
    allAtivos = [];
    let url = '/sites/' + siteId + '/lists/' + listId + '/items?$expand=fields&$top=500';
    while (url) {
      const res = await graphGet(url);
      allAtivos = allAtivos.concat(res.value.map(i => i.fields));
      url = res['@odata.nextLink']
        ? res['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0', '')
        : null;
    }
    updateKPIs();
    updateCharts();
    populateFilters();
    filterTable();
    showToast(allAtivos.length + ' ativos carregados', 'success');
  } catch(e) {
    showToast('Erro ao carregar: ' + e.message, 'error');
    setTableLoading('Erro ao carregar dados.');
  }
}

// ─── KPIs ─────────────────────────────────────────────────────
function updateKPIs() {
  document.getElementById('kpi-total').textContent = allAtivos.length;
  document.getElementById('kpi-ativos').textContent   = allAtivos.filter(a => (a.Status||'').toLowerCase() === 'ativo').length;
  document.getElementById('kpi-inativos').textContent = allAtivos.filter(a => (a.Status||'').toLowerCase() === 'inativo').length;
  document.getElementById('kpi-categorias').textContent = new Set(allAtivos.map(a => a.Categoria).filter(Boolean)).size;
}

// ─── CHARTS ───────────────────────────────────────────────────
function updateCharts() {
  const catCount = {};
  allAtivos.forEach(a => { const c = a.Categoria||'Sem categoria'; catCount[c]=(catCount[c]||0)+1; });
  const cats = Object.keys(catCount);

  if (chartCat) chartCat.destroy();
  chartCat = new Chart(document.getElementById('chart-categoria'), {
    type: 'bar',
    data: { labels: cats, datasets: [{ data: cats.map(c=>catCount[c]), backgroundColor: '#f5a623cc', borderColor: '#f5a623', borderWidth: 1, borderRadius: 6 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ticks:{color:'#8b90a7',font:{size:10}},grid:{color:'#2e3348'}}, y:{ticks:{color:'#8b90a7'},grid:{color:'#2e3348'}} } }
  });

  const stCount = {};
  allAtivos.forEach(a => { const s = a.Status||'Não definido'; stCount[s]=(stCount[s]||0)+1; });
  const sts = Object.keys(stCount);
  const stColors = sts.map(s => {
    const v = s.toLowerCase();
    if (v==='ativo') return '#27c07a';
    if (v==='inativo') return '#e05252';
    if (v.includes('manut')) return '#f5a623';
    return '#4a9eff';
  });

  if (chartSt) chartSt.destroy();
  chartSt = new Chart(document.getElementById('chart-status'), {
    type: 'doughnut',
    data: { labels: sts, datasets: [{ data: sts.map(s=>stCount[s]), backgroundColor: stColors, borderWidth: 0 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'right',labels:{color:'#e8eaf0',font:{size:12},padding:16}} } }
  });
}

// ─── FILTROS ──────────────────────────────────────────────────
function populateFilters() {
  const sel = document.getElementById('filter-categoria');
  const cats = [...new Set(allAtivos.map(a => a.Categoria).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas as categorias</option>' + cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
}

function filterTable() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const cat  = document.getElementById('filter-categoria').value;
  const stat = document.getElementById('filter-status').value;
  filtered = allAtivos.filter(a => {
    const matchQ = !q || [a.PLACA_x002f_NUMERO_SERIE,a.TAG_PLANGECON,a.TAG_CLIENTE,a.MODELO,a.MARCA,a.Categoria].some(v=>(v||'').toLowerCase().includes(q));
    return matchQ && (!cat || a.Categoria===cat) && (!stat || (a.Status||'')===stat);
  });
  if (sortField) {
    filtered.sort((a,b) => {
      const va=(a[sortField]||'').toString().toLowerCase();
      const vb=(b[sortField]||'').toString().toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }
  currentPage = 1;
  renderTable();
}

function sortTable(field) {
  if (sortField===field) sortAsc=!sortAsc; else { sortField=field; sortAsc=true; }
  filterTable();
}

// ─── RENDER ───────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('table-body');
  const total = filtered.length;
  const start = (currentPage-1)*pageSize;
  const page  = filtered.slice(start, start+pageSize);
  document.getElementById('table-count').textContent = total + ' registros';
  document.getElementById('pagination-info').textContent = 'Mostrando '+(start+1)+'–'+Math.min(start+pageSize,total)+' de '+total;

  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty">Nenhum ativo encontrado.</div></td></tr>';
    renderPagination(total); return;
  }

  tbody.innerHTML = page.map(a =>
    '<tr onclick=\'openDetail(' + JSON.stringify(JSON.stringify(a)) + ')\'>' +
    '<td>'+(a.Categoria||'—')+'</td>' +
    '<td>'+(a.PLACA_x002f_NUMERO_SERIE||'—')+'</td>' +
    '<td>'+(a.TAG_PLANGECON||'—')+'</td>' +
    '<td>'+(a.TAG_CLIENTE||'—')+'</td>' +
    '<td>'+(a.MARCA||'—')+'</td>' +
    '<td>'+(a.MODELO||'—')+'</td>' +
    '<td>'+(a.ANO||'—')+'</td>' +
    '<td>'+(a.CENTRO_DE_CUSTO||'—')+'</td>' +
    '<td>'+badgeStatus(a.Status)+'</td>' +
    '</tr>'
  ).join('');

  renderPagination(total);
}

function badgeStatus(s) {
  const v=(s||'').toLowerCase();
  if (v==='ativo') return '<span class="badge badge-ativo">Ativo</span>';
  if (v==='inativo') return '<span class="badge badge-inativo">Inativo</span>';
  if (v.includes('manut')) return '<span class="badge badge-manutencao">Manutenção</span>';
  return s ? '<span class="badge badge-default">'+s+'</span>' : '—';
}

function renderPagination(total) {
  const pages = Math.ceil(total/pageSize);
  const btns  = document.getElementById('page-btns');
  if (pages<=1) { btns.innerHTML=''; return; }
  let html = '<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';
  const range=[];
  for (let i=1;i<=pages;i++) {
    if (i===1||i===pages||Math.abs(i-currentPage)<=2) range.push(i);
    else if (range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p => {
    if (p==='…') html+='<span style="padding:6px 4px;color:var(--text2)">…</span>';
    else html+='<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  });
  html+='<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===pages?'disabled':'')+'>›</button>';
  btns.innerHTML=html;
}

function goPage(p) {
  const pages=Math.ceil(filtered.length/pageSize);
  if (p<1||p>pages) return;
  currentPage=p; renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setTableLoading(msg) {
  document.getElementById('table-body').innerHTML =
    '<tr><td colspan="9"><div class="loading"><div class="spinner"></div>'+(msg||'Carregando...')+'</div></td></tr>';
}

// ─── MODAL ────────────────────────────────────────────────────
function openModal(item) {
  editingId = item ? item.id : null;
  document.getElementById('modal-title').textContent = item ? 'Editar Ativo' : 'Novo Ativo';
  const map = {
    'f-categoria':'Categoria','f-centro':'CENTRO_DE_CUSTO',
    'f-placa':'PLACA_x002f_NUMERO_SERIE','f-tag-cliente':'TAG_CLIENTE',
    'f-tag-plangecon':'TAG_PLANGECON','f-marca':'MARCA','f-modelo':'MODELO',
    'f-ano':'ANO','f-chassi':'CHASSI','f-renavam':'RENAVAM',
    'f-proprietario':'PROPRIETÁRIO','f-patrimonio':'Patrimonio','f-tipo':'TIPO'
  };
  Object.entries(map).forEach(([id,key]) => document.getElementById(id).value = item ? (item[key]||'') : '');
  document.getElementById('f-status').value = item ? (item.Status||'Ativo') : 'Ativo';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOverlay(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

async function saveAtivo() {
  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Salvando...';
  try {
    const fields = {
      Categoria: document.getElementById('f-categoria').value,
      CENTRO_DE_CUSTO: document.getElementById('f-centro').value,
      PLACA_x002f_NUMERO_SERIE: document.getElementById('f-placa').value,
      TAG_CLIENTE: document.getElementById('f-tag-cliente').value,
      TAG_PLANGECON: document.getElementById('f-tag-plangecon').value,
      MARCA: document.getElementById('f-marca').value,
      MODELO: document.getElementById('f-modelo').value,
      ANO: document.getElementById('f-ano').value,
      CHASSI: document.getElementById('f-chassi').value,
      RENAVAM: document.getElementById('f-renavam').value,
      'PROPRIETÁRIO': document.getElementById('f-proprietario').value,
      Patrimonio: document.getElementById('f-patrimonio').value,
      TIPO: document.getElementById('f-tipo').value,
      Status: document.getElementById('f-status').value
    };
    if (editingId) {
      await graphPatch('/sites/'+siteId+'/lists/'+listId+'/items/'+editingId+'/fields', fields);
      showToast('Ativo atualizado!', 'success');
    } else {
      await graphPost('/sites/'+siteId+'/lists/'+listId+'/items', { fields });
      showToast('Ativo cadastrado!', 'success');
    }
    closeModal(); closeDetail(); await loadAtivos();
  } catch(e) {
    showToast('Erro ao salvar: ' + e.message, 'error');
  } finally {
    btn.disabled=false; btn.textContent='💾 Salvar';
  }
}

// ─── DETALHE ──────────────────────────────────────────────────
function openDetail(jsonStr) {
  detailItem = JSON.parse(jsonStr);
  document.getElementById('detail-title').textContent = detailItem.PLACA_x002f_NUMERO_SERIE || detailItem.TAG_PLANGECON || 'Detalhe';
  const r = (l,v) => '<div class="detail-item"><label>'+l+'</label><value>'+(v||'—')+'</value></div>';
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-grid">' +
    r('Categoria',detailItem.Categoria) + r('Status',detailItem.Status) +
    r('Placa / Nº Série',detailItem.PLACA_x002f_NUMERO_SERIE) + r('Tag Plangecon',detailItem.TAG_PLANGECON) +
    r('Tag Cliente',detailItem.TAG_CLIENTE) + r('Centro de Custo',detailItem.CENTRO_DE_CUSTO) +
    r('Marca',detailItem.MARCA) + r('Modelo',detailItem.MODELO) +
    r('Ano',detailItem.ANO) + r('Chassi',detailItem.CHASSI) +
    r('RENAVAM',detailItem.RENAVAM) + r('Proprietário',detailItem['PROPRIETÁRIO']) +
    r('Patrimônio',detailItem.Patrimonio) + r('Tipo',detailItem.TIPO) +
    '</div>';
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); detailItem=null; }
function closeDetailOverlay(e) { if (e.target===document.getElementById('detail-overlay')) closeDetail(); }
function editAtivo() { const item=detailItem; closeDetail(); openModal(item); }

async function deleteAtivo() {
  if (!detailItem || !confirm('Excluir este ativo? Esta ação não pode ser desfeita.')) return;
  const btn=document.getElementById('btn-delete');
  btn.disabled=true; btn.textContent='Excluindo...';
  try {
    await graphDelete('/sites/'+siteId+'/lists/'+listId+'/items/'+detailItem.id);
    showToast('Ativo excluído.', 'success');
    closeDetail(); await loadAtivos();
  } catch(e) {
    showToast('Erro: '+e.message,'error');
    btn.disabled=false; btn.textContent='🗑 Excluir';
  }
}

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg, type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'success')+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}

</script>
</body>
</html>
